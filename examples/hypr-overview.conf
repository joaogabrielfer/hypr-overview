# Legacy hyprlang example (Hyprland <= 0.54).
# The plugin does not reserve any keys; choose your own binding.
bind = SUPER, O, hyproverview_toggle

# Optional explicit controls:
# bind = ALT, left,  hyproverview_move, left
# bind = ALT, right, hyproverview_move, right
# bind = ALT, up,    hyproverview_move, up
# bind = ALT, down,  hyproverview_move, down

# Return and keypad Enter are handled internally while the overview is open.
